<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>宝宝的私房菜馆</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tailwind.min.css">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
    {% if csrf_token %}
    <meta name="csrf-token" content="{{ csrf_token }}">
    {% endif %}
    {% if current_user and current_user.theme_color %}
    <style>
        :root { --brand: {{ current_user.theme_color }}; --brand-dark: {{ current_user.theme_color }}cc; --brand-light: {{ current_user.theme_color }}99; --brand-bg: {{ current_user.theme_color }}1a; }
        .btn-primary:hover { box-shadow: 0 4px 12px color-mix(in srgb, var(--brand) 30%, transparent); }
        .input:focus { box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 12%, transparent); }
    </style>
    {% endif %}
</head>
<body>
    {% if current_user %}
    <header class="sticky top-0 z-50 bg-white/85 backdrop-blur-2xl border-b" style="border-color: var(--border-light);">
        <div class="flex items-center justify-between px-4 h-14 max-w-2xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white text-sm font-black shadow-sm" style="background: linear-gradient(135deg, var(--brand), var(--brand-dark));">
                    <i class="fas fa-utensils text-xs"></i>
                </div>
                <div>
                    <h1 class="font-black text-stone-800 text-sm leading-tight tracking-tight">宝宝的私房菜馆</h1>
                    <p class="text-[10px] text-stone-400 font-medium">{{ current_user.name }}</p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <a href="/settings" class="btn btn-ghost btn-icon" aria-label="设置">
                    <i class="fas fa-cog text-stone-500"></i>
                </a>
                <a href="/admin" class="btn btn-ghost btn-icon" aria-label="管理">
                    <i class="fas fa-users-cog text-stone-500"></i>
                </a>
                <form action="/logout" method="POST" class="inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="btn btn-ghost btn-icon" aria-label="退出">
                        <i class="fas fa-sign-out-alt text-stone-500"></i>
                    </button>
                </form>
            </div>
        </div>
    </header>
    {% endif %}

    <main class="max-w-2xl mx-auto px-4 pt-5 pb-6 space-y-5">
        {% block content %}{% endblock %}
    </main>

    {% if current_user %}
    <nav aria-label="主导航" class="fixed bottom-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-2xl border-t border-stone-100" style="padding-bottom: env(safe-area-inset-bottom, 0px)">
        <div class="max-w-2xl mx-auto flex justify-around items-center h-16 px-2">
            <a href="/" aria-current="{% if request.url.path == '/' %}page{% endif %}" class="nav-item flex flex-col items-center justify-center gap-0.5 min-w-[3rem] min-h-[3rem] rounded-xl transition-all duration-200 {% if request.url.path == '/' %}nav-active{% else %}text-stone-400 hover:text-stone-500{% endif %}" aria-label="菜单">
                <i class="fas fa-utensils text-lg"></i>
                <span class="text-[10px] font-bold">菜单</span>
            </a>
            <a href="/order" aria-current="{% if request.url.path == '/order' %}page{% endif %}" class="nav-item flex flex-col items-center justify-center gap-0.5 min-w-[3rem] min-h-[3rem] rounded-xl transition-all duration-200 {% if request.url.path == '/order' %}nav-active{% else %}text-stone-400 hover:text-stone-500{% endif %}" aria-label="点餐">
                <i class="fas fa-plus-circle text-lg"></i>
                <span class="text-[10px] font-bold">点餐</span>
            </a>
            <a href="/my-orders" aria-current="{% if request.url.path == '/my-orders' %}page{% endif %}" class="nav-item flex flex-col items-center justify-center gap-0.5 min-w-[3rem] min-h-[3rem] rounded-xl transition-all duration-200 {% if request.url.path == '/my-orders' %}nav-active{% else %}text-stone-400 hover:text-stone-500{% endif %}" aria-label="订单">
                <i class="fas fa-clipboard-list text-lg"></i>
                <span class="text-[10px] font-bold">订单</span>
            </a>
            <a href="/history" aria-current="{% if request.url.path == '/history' %}page{% endif %}" class="nav-item flex flex-col items-center justify-center gap-0.5 min-w-[3rem] min-h-[3rem] rounded-xl transition-all duration-200 {% if request.url.path == '/history' %}nav-active{% else %}text-stone-400 hover:text-stone-500{% endif %}" aria-label="记录">
                <i class="fas fa-history text-lg"></i>
                <span class="text-[10px] font-bold">记录</span>
            </a>
        </div>
    </nav>
    {% endif %}

    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 w-full max-w-xs pointer-events-none" role="status" aria-live="polite"></div>

    <div id="modal-container" class="hidden modal-overlay fixed inset-0 z-[60] bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-4" onclick="if(event.target===this)closeModal('modal-container')">
        <div id="modal-body" class="modal-content w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <!-- Content loaded via HTMX -->
        </div>
    </div>

    <script>
        document.addEventListener('submit', function(e) {
            const form = e.target;
            const btn = form.querySelector('button[type="submit"]') ||
                        form.querySelector('input[type="submit"]');
            if (btn && !form.getAttribute('data-submitting')) {
                form.setAttribute('data-submitting', 'true');
                btn.classList.add('btn-loading');
                btn.disabled = true;
            }
        });

        function openModal(id) {
            var modal = document.getElementById(id);
            if (!modal) return;
            modal.classList.remove('hidden');
            requestAnimationFrame(function() { modal.classList.add('active'); });
        }

        function closeModal(id) {
            var modal = document.getElementById(id);
            if (!modal) return;
            modal.classList.remove('active');
            setTimeout(function() {
                modal.classList.add('hidden');
                if (id === 'modal-container') {
                    document.getElementById('modal-body').innerHTML = '';
                }
            }, 250);
        }

        function showToast(message, type) {
            var c = document.getElementById('toast-container');
            if (!c) return;
            var t = document.createElement('div');
            t.className = 'toast pointer-events-auto';
            var colors = { success: 'bg-green-50 text-green-800 border border-green-200', error: 'bg-red-50 text-red-800 border border-red-200', info: 'bg-white text-stone-800 border border-stone-200' };
            var icons = { success: 'fa-check-circle text-green-500', error: 'fa-exclamation-circle text-red-500', info: 'fa-info-circle text-orange-500' };
            t.className += ' ' + (colors[type] || colors.info);
            var iconSpan = document.createElement('i');
            iconSpan.className = 'fas ' + (icons[type] || icons.info);
            t.appendChild(iconSpan);
            t.appendChild(document.createTextNode(' ' + message));
            c.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                t.style.transform = 'translateX(100%)';
                t.style.transition = 'all .3s cubic-bezier(.4,0,.2,1)';
                setTimeout(function() { t.remove(); }, 300);
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', function() {
            var p = new URLSearchParams(window.location.search);
            if (p.has('msg')) { showToast(p.get('msg'), 'success'); window.history.replaceState({}, document.title, window.location.pathname); }
        });

        document.body.addEventListener('htmx:afterSwap', function(e) {
            var trigger = e.detail.requestConfig;
            if (trigger && trigger.path) {
                var url = new URL(trigger.path, window.location.origin);
                var msg = url.searchParams.get('msg');
                if (msg) showToast(msg, 'success');
            }
        });

        document.body.addEventListener('htmx:configRequest', function(e) {
            var meta = document.querySelector('meta[name="csrf-token"]');
            if (meta) {
                e.detail.headers['X-CSRF-Token'] = meta.getAttribute('content');
            }
        });

        document.body.addEventListener('htmx:responseError', function(e) {
            var msg = '请求失败';
            if (e.detail.xhr && e.detail.xhr.status === 429) {
                msg = '操作过于频繁，请稍后再试';
            } else if (e.detail.xhr && e.detail.xhr.status === 413) {
                msg = '文件过大，请压缩后上传';
            } else if (e.detail.xhr && e.detail.xhr.status >= 500) {
                msg = '服务器异常，请稍后再试';
            }
            showToast(msg, 'error');
        });

        document.body.addEventListener('htmx:sendError', function(e) {
            showToast('网络连接失败，请检查网络', 'error');
        });

        function loadDishDetail(id) {
            var body = document.getElementById('modal-body');
            if (!body) return;
            body.innerHTML = '<div class="flex items-center justify-center p-12"><i class="fas fa-spinner fa-spin text-2xl text-stone-300"></i></div>';
            if (typeof htmx !== 'undefined') {
                htmx.ajax('GET', '/dish-detail/' + id, {target: '#modal-body'});
                openModal('modal-container');
            }
        }

        function loadRecipe(id) {
            var body = document.getElementById('modal-body');
            if (!body) return;
            body.innerHTML = '<div class="flex items-center justify-center p-12"><i class="fas fa-spinner fa-spin text-2xl text-stone-300"></i></div>';
            if (typeof htmx !== 'undefined') {
                htmx.ajax('GET', '/recipe-editor/' + id, {target: '#modal-body'});
                openModal('modal-container');
            }
        }

        // Button ripple effect — track mouse position for radial gradient
        document.addEventListener('mousedown', function(e) {
            var btn = e.target.closest('.btn');
            if (!btn) return;
            var rect = btn.getBoundingClientRect();
            var x = ((e.clientX - rect.left) / rect.width * 100).toFixed(0);
            var y = ((e.clientY - rect.top) / rect.height * 100).toFixed(0);
            btn.style.setProperty('--ripple-x', x + '%');
            btn.style.setProperty('--ripple-y', y + '%');
        });
    </script>
</body>
</html>
