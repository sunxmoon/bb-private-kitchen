{% extends "base.html" %}

{% block content %}
<div class="text-center mb-6">
    <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-sm" style="background:var(--brand-bg);color:var(--brand)">
        <i class="fas fa-cog text-2xl"></i>
    </div>
    <h2 class="text-2xl font-black text-stone-800">个人设置</h2>
    <p class="text-xs text-stone-400 mt-1">修改密码和个性化设置</p>
</div>

<form action="/settings" method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="card p-5 space-y-4">
        <div class="flex items-center gap-2 mb-1">
            <i class="fas fa-lock text-stone-400 text-xs"></i>
            <span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">修改密码</span>
        </div>
        <div>
            <label class="input-label">新密码（至少8个字符）</label>
            <input type="password" name="password" class="input" placeholder="留空则不修改" minlength="8">
        </div>
    </div>

    <div class="card p-5 space-y-4">
        <div class="flex items-center gap-2 mb-1">
            <i class="fas fa-palette text-stone-400 text-xs"></i>
            <span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">主题色</span>
        </div>
        <div class="flex items-center gap-4">
            <input type="color" name="theme_color" value="{{ current_user.theme_color or '#f97316' }}" class="w-12 h-12 rounded-xl border border-stone-200 cursor-pointer">
            <span class="text-xs text-stone-400">点击选择颜色</span>
        </div>
    </div>

    <button type="submit" class="btn btn-primary w-full py-4">保存设置</button>
</form>
{% endblock %}
